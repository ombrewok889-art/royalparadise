  <style amp-custom>
    *{box-sizing:border-box;margin:0;padding:0}
    :focus{outline:0}
    ::-webkit-scrollbar{display:none}

    html{
      max-width:100%;
      margin:0 auto;
      background-color:#0f0804;
      background-image:
        radial-gradient(circle at top, rgba(255,140,0,.14), transparent 40%),
        url('https://res.cloudinary.com/dtngwaxwx/image/upload/v1776315789/background_c6qgu3.webp');
      background-repeat:no-repeat,no-repeat;
      background-position:center top,center top;
      background-size:cover,cover;
      background-attachment:fixed,fixed;
    }

    body{
      color:#fff7ef;
      font-family:'Noto Sans', Arial, sans-serif;
    }

    .wrapper{
      background:rgba(20,10,4,.80);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-radius:16px;
      border:2px solid #ff8c1a;
      padding:20px;
      max-width:550px;
      margin:20px auto;
      animation:float 5s ease-in-out infinite, breathGlow 3s alternate infinite;
      box-shadow:0 0 25px rgba(255,140,26,.25);
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    @keyframes breathGlow{
      0%{box-shadow:0 0 14px rgba(255,140,26,.30), inset 0 0 10px rgba(255,140,26,.10)}
      100%{box-shadow:0 0 36px rgba(255,140,26,.58), inset 0 0 18px rgba(255,140,26,.22)}
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
      animation:logoPulse 2s infinite alternate;
    }

    @keyframes logoPulse{
      0%{filter:drop-shadow(0 0 6px #ff8c1a)}
      100%{filter:drop-shadow(0 0 20px #ff6a00)}
    }

    .block-img{
      position:relative;
      margin:auto;
      border-radius:12px;
      overflow:hidden;
      border:2px solid #ff8c1a;
      margin-bottom:20px;
      animation:imgGlow 3s infinite alternate;
      transition:transform .4s ease;
    }

    .block-img:hover{
      transform:scale(1.02);
    }

    @keyframes imgGlow{
      0%{box-shadow:0 0 10px #ff8c1a;border-color:#ff8c1a}
      100%{box-shadow:0 0 24px #ff6a00;border-color:#ff6a00}
    }

    .container{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
      margin-bottom:20px;
    }

    .block{
      position:relative;
      text-align:center;
      padding:14px 10px;
      background:linear-gradient(135deg,#ff8c1a,#d95d00,#ffb347);
      background-size:200% 200%;
      color:#1a0d05;
      font-weight:700;
      text-decoration:none;
      border-radius:8px;
      border:1px solid rgba(255,255,255,.35);
      text-shadow:none;
      overflow:hidden;
      transition:all .3s ease;
      animation:gradientMove 3s ease infinite;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .block::before{
      content:'';
      position:absolute;
      top:0;
      left:-150%;
      width:150%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
      transform:skewX(-25deg);
      animation:shimmer 2.5s infinite;
    }

    @keyframes shimmer{
      0%{left:-150%}
      100%{left:150%}
    }

    .block:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:0 10px 20px rgba(255,140,26,.45);
      border-color:#fff;
      color:#1a0d05;
    }

    .grid-pasaran{
      position:relative;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:10px;
      padding:12px;
      background:#140a04;
      border-radius:12px;
      overflow:hidden;
    }

    .grid-pasaran:before{
      content:'';
      position:absolute;
      width:200%;
      height:200%;
      background:conic-gradient(transparent,transparent,transparent,#ff6a00,#ff8c1a,#fff0d9);
      top:-50%;
      left:-50%;
      animation:rotate-neon 2.8s linear infinite;
      z-index:1;
    }

    .grid-pasaran:after{
      content:'';
      position:absolute;
      inset:3px;
      background:#1a0d05;
      border-radius:9px;
      z-index:2;
    }

    @keyframes rotate-neon{
      100%{transform:rotate(360deg)}
    }

    .btn-pasaran-text{
      position:relative;
      z-index:3;
      text-align:center;
      padding:10px 5px;
      background:linear-gradient(145deg,#221006,#120904);
      color:#ffc27a;
      font-size:11px;
      font-weight:700;
      border-radius:6px;
      border:1px solid rgba(255,255,255,.20);
      box-shadow:0 2px 5px rgba(0,0,0,.8);
      text-transform:uppercase;
      user-select:none;
      cursor:default;
      transition:all .3s ease;
    }

    .btn-pasaran-text:hover{
      background:linear-gradient(145deg,#4b2208,#ff8c1a);
      box-shadow:0 0 15px #ff8c1a, inset 0 0 8px rgba(255,255,255,.25);
      color:#fff;
      transform:scale(1.08);
      border-color:#ffb347;
      z-index:4;
    }

    .text-center{
      text-align:center;
      font-size:13px;
      margin-top:25px;
      color:#e3c7a8;
      line-height:1.6;
    }

    .text-center a{
      color:#ffb347;
      text-decoration:none;
      font-weight:700;
      text-shadow:0 0 8px #ff8c1a;
      animation:textGlow 2s infinite alternate;
    }

    @keyframes textGlow{
      0%{text-shadow:0 0 5px #ffb347;color:#ffb347}
      100%{text-shadow:0 0 15px #ff8c1a,0 0 20px #ffd3a1;color:#ffffff}
    }

    @media (max-width:480px){
      .container{grid-template-columns:1fr 1fr}
    }
  </style>
